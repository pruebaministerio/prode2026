<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0a1628;--navy2:#111e35;--navy3:#182b47;--navy4:#1e3456;
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5e0a0;
  --red:#c0392b;--red2:#e74c3c;
  --white:#f0f4ff;--white2:#c8d4ee;
  --muted:#6a7a9a;--border:rgba(201,168,76,.18);--border2:rgba(201,168,76,.42);
  --gbg:rgba(39,174,96,.18);--gtx:#4cd98a;--gbr:rgba(39,174,96,.4);
  --ybg:rgba(243,156,18,.15);--ytx:#f5b942;--ybr:rgba(243,156,18,.35);
  --rbg:rgba(192,57,43,.18);--rtx:#e07070;--rbr:rgba(192,57,43,.35);
  --bbg:rgba(41,128,185,.18);--btx:#5dade2;--bbr:rgba(41,128,185,.4);
  --r:10px;--rsm:7px
}
html,body{height:100%;background:var(--navy);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;overflow:hidden;-webkit-text-size-adjust:100%}
input,button,select,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--navy4);border-radius:2px}
/* App shell: header+tabbar sticky top, content scrolls below */
#root{display:flex;flex-direction:column;height:100%;height:100dvh;width:100%}
.top-bar{flex-shrink:0;background:var(--navy2);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 80px}
.screen.auth-screen{display:flex;flex-direction:column;justify-content:center;padding:16px}
/* Header */
.hdr{padding:7px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-logo{display:flex;align-items:center;gap:7px}
.hdr-title{font-size:14px;font-weight:700;color:var(--gold2);line-height:1.2}
.hdr-title small{display:block;font-size:11px;font-weight:400;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--navy3);border:1.5px solid var(--gold);color:var(--gold);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.badge-admin{font-size:8px;background:var(--gold);color:var(--navy);border-radius:3px;padding:1px 4px;font-weight:700;margin-left:2px}
.btn-out{font-size:10px;color:var(--muted);border:1px solid var(--border2);border-radius:20px;padding:2px 8px}
/* FAB de consulta — globo flotante */
.fab-contact{position:fixed;bottom:22px;right:16px;z-index:150;width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,#2dd36f 0%,#18a24a 100%);box-shadow:0 4px 20px rgba(0,0,0,.45),0 0 0 3px rgba(45,211,111,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff;transition:transform .15s,box-shadow .15s}
.fab-contact:hover{transform:scale(1.09);box-shadow:0 6px 24px rgba(0,0,0,.55),0 0 0 5px rgba(45,211,111,.22)}
.fab-contact:active{transform:scale(.96)}
/* tooltip desktop */
.fab-contact::before{content:'Hacé tu consulta';position:absolute;right:60px;top:50%;transform:translateY(-50%);background:rgba(10,22,40,.92);color:var(--white);font-size:11px;white-space:nowrap;padding:5px 10px;border-radius:6px;border:1px solid var(--border);opacity:0;pointer-events:none;transition:opacity .2s .1s}
.fab-contact:hover::before{opacity:1}
/* Tabbar — horizontal row UNDER header, sticky */
.tabbar{display:flex;border-top:1px solid var(--border);overflow-x:auto}
.tabbar::-webkit-scrollbar{display:none}
.tb{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 6px;color:var(--muted);font-size:12px;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.tb.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.06)}
.tb svg{width:16px;height:16px;flex-shrink:0}
.sec{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin:12px 0 6px;padding:0 2px}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:6px;transition:border-color .15s}
.card.open{border-color:var(--gold)}
.mrow{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.mteam{font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mteam.r{text-align:right}
.mtime{font-size:11px;color:var(--muted);text-align:center;flex-shrink:0;min-width:44px}
.mtime.locked{color:var(--red2)}
.ptag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;flex-shrink:0;white-space:nowrap;cursor:pointer}
.ptag.none{background:var(--navy3);color:var(--muted)}
.ptag.pending{background:var(--navy3);color:var(--gold3)}
.ptag.correct{background:var(--gbg);color:var(--gtx);border:1px solid var(--gbr)}
.ptag.partial{background:var(--ybg);color:var(--ytx);border:1px solid var(--ybr)}
.ptag.wrong{background:var(--rbg);color:var(--rtx);border:1px solid var(--rbr)}
.rtag{font-size:11px;font-weight:600;background:var(--gbg);color:var(--gtx);border:1px solid var(--gbr);padding:3px 9px;border-radius:20px;flex-shrink:0}
.pform{border-top:1px solid var(--border);margin-top:9px;padding-top:9px}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.plbl{font-size:12px;color:var(--muted);white-space:nowrap}
.swrap{display:flex;align-items:center;gap:7px}
.sin{width:44px;height:38px;text-align:center;font-size:18px;font-weight:700;border:1.5px solid var(--border2);border-radius:var(--rsm);background:var(--navy3);color:var(--gold2);-moz-appearance:textfield;outline:none}
.sin::-webkit-outer-spin-button,.sin::-webkit-inner-spin-button{-webkit-appearance:none}
.sin:focus{border-color:var(--gold)}
.sdash{color:var(--muted);font-size:16px}
.hint{font-size:10px;color:var(--muted)}
.sc-sec{margin-bottom:8px}
.sc-lbl{font-size:11px;color:var(--muted);margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.chip{display:flex;align-items:center;gap:3px;background:rgba(201,168,76,.14);border:1px solid var(--border2);border-radius:20px;padding:3px 9px;font-size:12px;color:var(--gold3)}
.chip-x{color:var(--muted);font-size:14px;cursor:pointer;padding:0 2px}

.ssel:focus{border-color:var(--gold)}
.pen-row{display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:6px;border-top:1px dashed var(--border)}
.pen-lbl{font-size:11px;color:var(--red2)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-weight:700;font-size:13px;border-radius:var(--rsm);padding:8px 16px}
.btn-gold:disabled{opacity:.4}
.btn-out2{background:none;border:1px solid var(--border2);color:var(--muted);font-size:12px;border-radius:var(--rsm);padding:7px 12px}
.btn-blue{background:var(--bbg);border:1px solid var(--bbr);color:var(--btx);font-size:11px;border-radius:var(--rsm);padding:4px 9px}
.btn-red{background:var(--rbg);border:1px solid var(--rbr);color:var(--rtx);font-size:11px;border-radius:var(--rsm);padding:4px 9px}
.fg{margin-bottom:11px}.fl{font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:500}
.fi{width:100%;height:46px;background:var(--navy3);border:1.5px solid var(--border);border-radius:var(--rsm);color:var(--white);padding:0 12px;font-size:16px;outline:none}
.fi:focus{border-color:var(--gold)}.fi::placeholder{color:var(--muted)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ferr{font-size:12px;color:var(--rtx);background:var(--rbg);border-radius:var(--rsm);padding:7px 11px;margin-bottom:10px}
.fnote{font-size:11px;color:var(--muted);text-align:center;margin-top:9px}
.fnote a{color:var(--gold);cursor:pointer}
.fhint{font-size:10px;margin-top:2px;padding:0 2px}
.ferr-inline{color:var(--rtx)}
.fok-inline{color:var(--gtx)}
.captcha-box{background:var(--navy3);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px;margin-top:6px}
.act-banner{background:rgba(201,120,30,.12);border:1px solid rgba(201,120,30,.4);border-radius:var(--rsm);padding:10px 14px;margin-bottom:12px;font-size:12px;color:#e8a050;display:flex;align-items:center;gap:8px}
.act-banner strong{font-size:13px;display:block;margin-bottom:2px}
.pago-card{background:var(--navy2);border:1px solid rgba(201,120,30,.45);border-radius:var(--r);padding:14px 14px 12px;margin-bottom:14px}
.pago-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.pago-subtitle{font-size:11px;color:var(--muted);margin-bottom:10px}
.pago-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;background:var(--navy3);border:1px solid var(--border);border-radius:var(--rsm);padding:7px 10px}
.pago-lbl{font-size:10px;color:var(--muted);min-width:52px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}

.pago-copy{font-size:10px;padding:2px 9px;background:var(--navy4,var(--navy2));border:1px solid var(--border2);border-radius:10px;cursor:pointer;color:var(--muted);flex-shrink:0;transition:color .15s}
.pago-copy:hover{color:var(--white)}.pago-copy.done{color:var(--gtx);border-color:var(--gbr)}
.pago-concepto{border-color:rgba(201,120,30,.45);background:rgba(201,120,30,.07)}
.pago-concepto .pago-lbl{color:#e8a050}
.pago-concepto .pago-val{color:#ffd080;font-weight:700}
.pago-hint{font-size:10px;color:#e8a050;margin:-3px 0 10px 2px}
.pago-sep{border:none;border-top:1px solid var(--border);margin:12px 0}
.pago-timeline{font-size:11px;color:var(--muted);background:var(--navy3);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 11px;margin-top:10px;line-height:1.6}
.pago-timeline strong{color:var(--white)}
.pago-contact-link{color:var(--gold);cursor:pointer;text-decoration:underline;text-underline-offset:2px;font-weight:600}
.contact-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.contact-box{background:var(--navy2);border:1px solid rgba(201,168,76,.25);border-radius:var(--r);padding:20px;width:100%;max-width:360px}
.contact-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.contact-head strong{font-size:13px;color:var(--gold)}
.contact-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
.contact-close:hover{color:var(--white)}
.contact-ta{width:100%;background:var(--navy3);border:1px solid rgba(201,168,76,.2);border-radius:var(--rsm);color:var(--white);padding:9px 11px;font-size:12px;resize:vertical;font-family:inherit;line-height:1.5;min-height:90px}
.contact-ta:focus{outline:none;border-color:rgba(201,168,76,.5)}
.contact-sent{text-align:center;padding:16px 0}
.un-sug{font-size:10px;color:var(--gold);margin-top:3px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.un-sug:hover{text-decoration:underline}
.badge-pending{font-size:9px;font-weight:800;background:rgba(201,120,30,.2);color:#e8a050;border:1px solid rgba(201,120,30,.4);border-radius:10px;padding:1px 6px;margin-left:4px;letter-spacing:.04em;vertical-align:middle}
.uact{display:flex;align-items:center;gap:6px;margin-top:5px}
.ufilter{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ufilter input{flex:1;min-width:120px;background:var(--navy3);border:1px solid var(--border);border-radius:var(--rsm);padding:6px 10px;font-size:12px;color:var(--white);outline:none}
.ufilter input:focus{border-color:var(--border2)}
.ufilter input::placeholder{color:var(--muted)}
.ufbtn{font-size:10px;padding:4px 10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.ufbtn.on{background:var(--navy3);border-color:var(--border2);color:var(--white)}
.ucount{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.dot-act{width:8px;height:8px;border-radius:50%;background:var(--gbr);flex-shrink:0}
.dot-pen{width:8px;height:8px;border-radius:50%;background:#e8a050;flex-shrink:0}
.auth-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:22px}
.auth-t{font-size:20px;font-weight:800;color:var(--gold2);text-align:center}
.auth-s{font-size:12px;color:var(--muted);text-align:center;margin-top:2px}
.auth-card{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px}
.sec-h{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px}
.score-card{background:linear-gradient(135deg,var(--navy3),var(--navy2));border:1px solid var(--border2);border-radius:var(--r);padding:10px 13px;margin-bottom:10px;display:flex;align-items:center;gap:11px}
.score-big{font-size:32px;font-weight:800;color:var(--gold2);line-height:1}
.score-lbl{font-size:11px;color:var(--muted)}

.score-detail span{font-size:12px;color:var(--muted)}
.score-detail strong{color:var(--white2)}
.pts-leg{display:flex;gap:6px;flex-wrap:wrap;background:var(--navy3);border-radius:var(--rsm);padding:6px 10px;margin-bottom:8px}
.pts-leg span{font-size:12px;color:var(--muted)}.pts-leg strong{color:var(--gold3)}
.lb-item{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:4px}
.lb-rank{font-size:13px;font-weight:700;width:20px;text-align:center;color:var(--muted);flex-shrink:0}
.lb-rank.g{color:var(--gold)}.lb-rank.s{color:#b0b8cc}.lb-rank.b{color:#c08050}

.lb-name small{font-size:11px;color:var(--muted)}
.lb-pts{text-align:right;flex-shrink:0}.lb-pts-n{font-size:18px;font-weight:800;color:var(--gold2)}.lb-pts-l{font-size:11px;color:var(--muted)}
.gf{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:11px}
.gfb{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.gfb.active{background:rgba(201,168,76,.14);color:var(--gold);border-color:var(--border2)}
.stabs{display:flex;gap:5px;margin-bottom:12px}
.stab{flex:1;text-align:center;padding:7px;font-size:12px;border-radius:var(--rsm);background:var(--navy3);color:var(--muted);border:1px solid var(--border)}

.tsel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}

.plist{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;margin-bottom:9px}
.pitem{display:flex;align-items:center;justify-content:space-between;background:var(--navy3);border-radius:var(--rsm);padding:7px 10px}
.pitem span{font-size:13px}
.textarea{width:100%;min-height:80px;background:var(--navy3);border:1.5px solid var(--border);border-radius:var(--rsm);color:var(--white);padding:9px;font-size:13px;outline:none;resize:vertical}

.uitem small{color:var(--muted);font-size:11px;display:block;line-height:1.6}
.admin-bar{display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap}
.rform{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:7px}

.br-champ-subtitle{font-size:8px;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-top:2px;opacity:.85}

<script>
const {useState,useEffect,useMemo}=React;
const h=React.createElement;
const API='./api.php';
const GROUPS=['A','B','C','D','E','F','G','H','I','J','K','L'];
const RONDAS=['R32','R16','QF','SF','FIN','3RD'];
const RL={R32:'16avos',R16:'Octavos',QF:'Cuartos',SF:'Semis',FIN:'Final','3RD':'3er Puesto'};

async function api(p){try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});return await r.json();}catch(e){return{ok:false,error:'Error de conexión'};}}
const SS={save:(u,t)=>{localStorage.setItem('v4u',JSON.stringify(u));localStorage.setItem('v4t',t);},load:()=>{try{const u=JSON.parse(localStorage.getItem('v4u')),t=localStorage.getItem('v4t');return u&&t?{user:u,token:t}:null;}catch{return null;}},clear:()=>{localStorage.removeItem('v4u');localStorage.removeItem('v4t');}};

function fmt(n){if(n===null||n===undefined)return'';return Number.isInteger(n)?String(n):n.toFixed(1);}
function fmtD(d){if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'short'});}

function Logo({size=36}){
  return h('img',{
    className:'logo-img',
    src:'imagenes/logo%20vale4.jpg',
    alt:'Vale 4',
    style:{width:size,height:size,borderRadius:Math.round(size*0.18)+'px'}
  });
}

function Trophy({size=70}){
  return h('img',{
    className:'trophy-img',
    src:'imagenes/copa.png',
    alt:'Copa Mundial',
    style:{width:size,height:'auto',display:'block'}
  });
}

function Av({name,sz=30}){return h('div',{className:'avatar',style:{width:sz,height:sz,fontSize:sz<34?11:13}},name.slice(0,2).toUpperCase());}

function computeStandings(matches,results){
  const grps={};
  matches.forEach(m=>{
    if(!grps[m.grp])grps[m.grp]={};
    const add=(t)=>{if(!grps[m.grp][t])grps[m.grp][t]={team:t,pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};};
    add(m.team1);add(m.team2);
    const r=results[m.id];
    if(!r||r.s1===null||r.s1===undefined)return;
    const t1=grps[m.grp][m.team1],t2=grps[m.grp][m.team2];
    t1.pj++;t2.pj++;
    t1.gf+=r.s1;t1.gc+=r.s2;t2.gf+=r.s2;t2.gc+=r.s1;
    if(r.s1>r.s2){t1.pts+=3;t1.pg++;t2.pp++;}
    else if(r.s1<r.s2){t2.pts+=3;t2.pg++;t1.pp++;}
    else{t1.pts++;t1.pe++;t2.pts++;t2.pe++;}
  });
  const out={};
  Object.entries(grps).forEach(([g,teams])=>{
    out[g]=Object.values(teams).sort((a,b)=>{
      if(b.pts!==a.pts)return b.pts-a.pts;
      const da=a.gf-a.gc,db=b.gf-b.gc;
      if(db!==da)return db-da;
      return b.gf-a.gf;
    });
  });
  return out;
}

function calcPickPts(pick,result){
  if(!pick||!result||result.s1===null||result.s1===undefined)return null;
  let pts=0;
  const po=Math.sign(pick.s1-pick.s2),ro=Math.sign(result.s1-result.s2);
  if(po===ro)pts+=1;
  if(pick.s1===result.s1&&pick.s2===result.s2)pts+=0.5;
  const all=[...(result.scorers1||[]),...(result.scorers2||[])];
  (pick.scorers||[]).forEach(s=>{if(all.includes(s))pts+=0.5;});
  return pts;
}

function ScorersRow({sc1=[],sc2=[]}){
  if(!sc1.length&&!sc2.length) return null;
  return h('div',{className:'sgol'},
    h('div',{className:'sgol-lbl'},'⚽ Goleadores'),
    h('div',{className:'sgol-teams'},
      h('div',{className:'sgol-side l'},sc1.map((s,i)=>h('span',{key:i,className:'sc-chip'},s))),
      h('div',{className:'sgol-div'}),
      h('div',{className:'sgol-side r'},sc2.map((s,i)=>h('span',{key:i,className:'sc-chip'},s)))
    )
  );
}

function ResultMatchCard({match,result,pick}){
  const hasR=result&&result.s1!==null&&result.s1!==undefined;
  const hasPick=pick!==null&&pick!==undefined;
  const pts=calcPickPts(pick,result);
  const all=hasR?[...(result.scorers1||[]),...(result.scorers2||[])] :[];

  let hitCls='hit hit-n',hitLbl='Sin resultado';
  if(pts!==null){
    if(pts>=1.5){hitCls='hit hit-g';hitLbl='✅ +'+fmt(pts)+'pts';}
    else if(pts===1){hitCls='hit hit-y';hitLbl='⚠ +1pt';}
    else if(pts>0){hitCls='hit hit-y';hitLbl='⚠ +'+fmt(pts)+'pts';}
    else{hitCls='hit hit-r';hitLbl='❌ 0pts';}
  }

  return h('div',{className:'rc'},
    h('div',{className:'rc-head'},
      h('span',{className:'rc-date'},fmtD(match.match_date)+(match.match_time?' · '+match.match_time:'')),
      !hasR&&hasPick&&h('span',{className:'hit hit-n',style:{fontSize:10}},'Pendiente')
    ),
    h('div',{className:'rc-match'},
      h('span',{className:'rc-team r'},match.team1),
      hasR?h('span',{className:'rc-score'},result.s1+'–'+result.s2):h('span',{className:'rc-no-res'},'vs'),
      h('span',{className:'rc-team'},match.team2)
    ),
    hasR&&h(ScorersRow,{sc1:result.scorers1||[],sc2:result.scorers2||[]}),
    hasPick&&h('div',{className:'rc-pick'},
      h('span',{className:'rc-pl'},'Pronós.:'),
      h('span',{className:'rc-ps'},pick.s1+'–'+pick.s2),
      hasR&&h('span',{className:hitCls},hitLbl),
      hasR&&(pick.scorers||[]).length>0&&h('div',{className:'sc-chips'},
        (pick.scorers||[]).map(s=>h('span',{key:s,className:'sc-chip '+(all.includes(s)?'sc-ok':'sc-no')},
          (all.includes(s)?'⚽ ':'')+ s
        ))
      )
    ),
    !hasPick&&h('div',{style:{marginTop:6,fontSize:11,color:'var(--muted)'}},
      hasR?'Sin pronóstico':'Sin pronóstico aún'
    )
  );
}

function LlaveResultados({koMatches,koResults}){
  const [ronda,setRonda]=useState('ALL');
  const [zoomStep,setZoomStep]=useState(0);
  const avail=useMemo(()=>[...new Set(koMatches.map(m=>m.ronda))].sort((a,b)=>RONDAS.indexOf(a)-RONDAS.indexOf(b)),[koMatches]);

  useEffect(()=>{
    if(ronda!=='ALL'){setZoomStep(0);return;}
    function applyScale(step){
      const inner=document.querySelector('.bracket-inner');
      const wrap=document.querySelector('.br-fit-wrap');
      if(!inner||!wrap) return;
      inner.style.transform='';
      const base=Math.min(1,(wrap.clientWidth-4)/inner.scrollWidth);
      const scale=Math.max(0.2,Math.min(3,base*Math.pow(1.35,step)));
      inner.style.transform='scale('+scale+')';
      inner.style.transformOrigin='top left';
      const bwrap=inner.parentElement;
      if(bwrap) bwrap.style.height=Math.ceil(inner.scrollHeight*scale+8)+'px';
      const zoomed=scale>base+0.05;
      wrap.style.overflow=zoomed?'auto':'hidden';
    }
    const t=setTimeout(()=>applyScale(zoomStep),120);
    const onResize=()=>applyScale(zoomStep);
    window.addEventListener('resize',onResize);
    return()=>{
      clearTimeout(t);
      window.removeEventListener('resize',onResize);
      const inner=document.querySelector('.bracket-inner');
      if(inner){inner.style.transform='';inner.style.transformOrigin='';}
      const wrapEl=document.querySelector('.br-fit-wrap');
      if(wrapEl){wrapEl.style.overflow='';const bw=wrapEl.querySelector('.bracket-wrap');if(bw)bw.style.height='';}
    };
  },[ronda,koMatches,zoomStep]);

  const TABS=[
    {key:'ALL', label:'🗺 Llave'},
    {key:'R32', label:'16avos', rondas:['R32']},
    {key:'R16', label:'Octavos',rondas:['R16']},
    {key:'QF',  label:'Cuartos',rondas:['QF']},
    {key:'SF',  label:'Semis',  rondas:['SF']},
    {key:'FIN', label:'⭐ Final',rondas:['FIN','3RD']},
  ].filter(t=>t.key==='ALL'||t.rondas.some(r=>avail.includes(r)));

  if(koMatches.length===0) return h('div',{style:{textAlign:'center',padding:'2rem 1rem',color:'var(--muted)'}},
    h('div',{style:{fontSize:14}},'El bracket se genera cuando terminen los grupos.')
  );

  const tabRondas=ronda!=='ALL'&&TABS.find(t=>t.key===ronda)?.rondas;

  return h('div',null,
    h('div',{className:'ronda-sel'},
      TABS.map(t=>h('button',{key:t.key,className:'rsb'+(ronda===t.key?' active':''),onClick:()=>setRonda(t.key)},t.label))
    ),
    ronda==='ALL'
      ?h('div',null,
          h('div',{className:'zoom-bar'},
            h('button',{className:'zoom-btn',title:'Alejar',onClick:()=>setZoomStep(p=>Math.max(-3,p-1))},'−'),
            h('span',{className:'zoom-lbl'},zoomStep===0?'Auto':zoomStep>0?'+'+Math.round(zoomStep*27)+'%':Math.round(zoomStep*27)+'%'),
            h('button',{className:'zoom-btn',title:'Acercar',onClick:()=>setZoomStep(p=>Math.min(5,p+1))},'+'),
            zoomStep!==0&&h('button',{className:'zoom-btn',title:'Reset',style:{fontSize:11},onClick:()=>setZoomStep(0)},'↺')
          ),
          h('div',{className:'br-fit-wrap'},h(BracketView,{koMatches,koPicks:{},koResults}))
        )
      :tabRondas&&tabRondas.flatMap(r=>koMatches.filter(m=>m.ronda===r)).map(m=>{
          const res=koResults[m.id];
          const hasR=res&&res.s1!==null;
          const scorers=[...(res?.scorers1||[]),...(res?.scorers2||[])];
          return h('div',{key:m.id,className:'rc',style:{marginBottom:8}},
            h('div',{className:'rc-match'},
              h('span',{className:'rc-team r'},m.team1||'TBD'),
              hasR
                ?h('span',{className:'rc-score'},res.s1+'−'+res.s2+(res.pen1!=null?' ('+res.pen1+'−'+res.pen2+'p)':''))
                :h('span',{className:'rc-no-res'},'vs'),
              h('span',{className:'rc-team'},m.team2||'TBD')
            ),
            hasR&&m.winner&&h('div',{style:{fontSize:11,color:'var(--gold2)',marginTop:4,textAlign:'center',fontWeight:700}},
              '🏆 '+m.winner
            ),
            hasR&&h(ScorersRow,{sc1:res?.scorers1||[],sc2:res?.scorers2||[]}),
            !hasR&&h('div',{style:{fontSize:11,color:'var(--muted)',textAlign:'center',marginTop:4}},'Sin resultado aún')
          );
        })
  );
}

function ClasificacionScreen({matches,results,picks,koMatches,koPicks,koResults}){
  const [claSub,setClaSub]=useState('grupos');
  const [grp,setGrp]=useState('A');
  const standings=useMemo(()=>computeStandings(matches,results),[matches,results]);

function calcMatchPts(pred,res){
  if(!pred||!res||res.s1===null)return 0;
  let pts=0;
  if(Math.sign(pred.s1-pred.s2)===Math.sign(res.s1-res.s2))pts+=1;
  if(pred.s1===res.s1&&pred.s2===res.s2)pts+=0.5;
  const all=[...(res.scorers1||[]),...(res.scorers2||[])];
  (pred.scorers||[]).forEach(g=>{if(all.includes(g))pts+=0.5;});
  return pts;
}

function KnockoutScreen({koMatches,koPicks,koResults,players,token,onPickSaved,onResultSaved,isAdmin,isActive=true}){
  const [ronda,setRonda]=useState('R32');
  const [zoomStep,setZoomStep]=useState(0);
  const avail=useMemo(()=>[...new Set(koMatches.map(m=>m.ronda))].sort((a,b)=>RONDAS.indexOf(a)-RONDAS.indexOf(b)),[koMatches]);

  useEffect(()=>{
    if(ronda!=='ALL'){setZoomStep(0);return;}

    function applyScale(step){
      const inner=document.querySelector('.bracket-inner');
      const wrap=document.querySelector('.br-fit-wrap');
      if(!inner||!wrap) return;
      inner.style.transform='';
      const base=Math.min(1,(wrap.clientWidth-4)/inner.scrollWidth);
      const scale=Math.max(0.2,Math.min(3,base*Math.pow(1.35,step)));
      inner.style.transform='scale('+scale+')';
      inner.style.transformOrigin='top left';
      const bwrap=inner.parentElement;
      if(bwrap) bwrap.style.height=Math.ceil(inner.scrollHeight*scale+8)+'px';
      const zoomed=scale>base+0.05;
      wrap.style.overflow=zoomed?'auto':'hidden';
      wrap.style.cursor=zoomed?'grab':'default';
    }

    const t=setTimeout(()=>applyScale(zoomStep),120);
    const onResize=()=>applyScale(zoomStep);
    window.addEventListener('resize',onResize);

    // Pinch-to-zoom: manipulamos DOM directo durante el gesto, state solo en touchend
    let pinchStart=null;
    let liveStep=zoomStep;
    function td(ts){const dx=ts[0].clientX-ts[1].clientX,dy=ts[0].clientY-ts[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
    function onTS(e){if(e.touches.length===2){pinchStart={d:td(e.touches),step:liveStep};}}
    function onTM(e){
      if(e.touches.length!==2||!pinchStart) return;
      const s=Math.max(-3,Math.min(5,pinchStart.step+Math.log(td(e.touches)/pinchStart.d)/Math.log(1.35)));
      liveStep=s; applyScale(s);
    }
    function onTE(){pinchStart=null;setZoomStep(Math.round(liveStep));}

    const wrap=document.querySelector('.br-fit-wrap');
    if(wrap){
      wrap.addEventListener('touchstart',onTS,{passive:true});
      wrap.addEventListener('touchmove',onTM,{passive:true});
      wrap.addEventListener('touchend',onTE);
    }

    return()=>{
      clearTimeout(t);
      window.removeEventListener('resize',onResize);
      const inner=document.querySelector('.bracket-inner');
      if(inner){inner.style.transform='';inner.style.transformOrigin='';}
      const wrapEl=document.querySelector('.br-fit-wrap');
      if(wrapEl){
        wrapEl.style.overflow='';wrapEl.style.cursor='';
        const bw=wrapEl.querySelector('.bracket-wrap');if(bw)bw.style.height='';
        wrapEl.removeEventListener('touchstart',onTS);
        wrapEl.removeEventListener('touchmove',onTM);
        wrapEl.removeEventListener('touchend',onTE);
      }
    };
  },[ronda,koMatches,zoomStep]);

  const TABS=[
    {key:'R32', label:'16avos', rondas:['R32']},
    {key:'R16', label:'Octavos',rondas:['R16']},

function PagoCard({user,token}){
  const [info,setInfo]=useState(null);

  const [contactSending,setContactSending]=useState(false);
  const [contactSent,setContactSent]=useState(false);
  const [contactErr,setContactErr]=useState('');

  async function sendContact(){
    if(!contactMsg.trim()) return setContactErr('Escribí tu consulta antes de enviar.');
    setContactSending(true); setContactErr('');
    const r=await api({action:'send_contact',token,message:contactMsg.trim()});
    setContactSending(false);
    if(r.ok) setContactSent(true);
    else setContactErr(r.error||'Error al enviar. Intentá de nuevo.');
  }
  function closeContact(){setShowContact(false);setContactSent(false);setContactMsg('');setContactErr('');}
  const [notErr,setNotErr]=useState('');
  const [copied,setCopied]=useState('');

  useEffect(()=>{
    api({action:'get_payment_info',token}).then(r=>{
      if(r.ok){setInfo(r);if(r.notified_recently)setNotified(true);}
    });
  },[]);

  function copy(key,text){
    if(!text) return;
    navigator.clipboard?.writeText(text).then(()=>{setCopied(key);setTimeout(()=>setCopied(''),2000);}).catch(()=>{});
  }

  async function notify(){
    setNotifying(true);setNotErr('');
    const r=await api({action:'notify_payment',token});
    setNotifying(false);

  const concepto='PRODE-'+user.username.toUpperCase();

  const PRow=({lbl,val,ckey,special})=>h('div',{className:'pago-row'+(special?' pago-concepto':'')},

    h('div',{className:'pago-hint'},'⚠ Usá este concepto exacto al transferir — te identifica en el sistema'),

    h('hr',{className:'pago-sep'}),
    h('div',{style:{fontSize:11,color:'var(--muted)',marginBottom:8}},'Una vez realizada la transferencia, avisanos:'),

    notified
      ?h('div',{style:{fontSize:12,color:'var(--gtx)',background:'var(--gbg)',border:'1px solid var(--gbr)',borderRadius:'var(--rsm)',padding:'9px 12px',display:'flex',gap:8,alignItems:'center'}},
          '✅ ',h('span',null,'Aviso enviado. ',h('strong',null,'Ya estamos verificando tu transferencia.')))
      :h('button',{className:'btn-gold',style:{width:'100%',height:42,fontSize:13},disabled:notifying||!info,onClick:notify},
          notifying?'Enviando…':'📲 Ya pagué — Notificar'),

    h('div',{className:'pago-timeline'},
      '⏳ ',h('strong',null,'En minutos se activará tu cuenta'),
      '. Según la actividad bancaria puede demorar hasta ',
      h('strong',null,'24 horas'),
      '. Ante cualquier consulta, ',
      h('span',{className:'pago-contact-link',onClick:()=>setShowContact(true)},'contactanos aquí'),
      '.'
    ),

    showContact&&h('div',{className:'contact-overlay',onClick:e=>e.target===e.currentTarget&&closeContact()},
      h('div',{className:'contact-box'},

              h('textarea',{className:'contact-ta',value:contactMsg,onChange:e=>setContactMsg(e.target.value),placeholder:'Tu consulta…',maxLength:500}),
              h('div',{style:{fontSize:10,color:'var(--muted)',textAlign:'right',marginTop:2}},contactMsg.length+'/500'),

function genCaptcha(){const a=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1;return{q:'¿Cuánto es '+a+' + '+b+'?',ans:String(a+b)};}

function fmtFecha(iso){
  if(!iso) return '';
  const [y,m,d]=iso.split('-');
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} de ${meses[parseInt(m)-1]} de ${y}`;
}

function AuthScreen({onLogin,regStatus={}}){
  const registroAbierto = regStatus.registro_abierto !== false; // true por defecto mientras carga
  const registroHasta   = regStatus.registro_hasta || '';

  const [mode,setMode]=useState('login');
  const [f,setF]=useState({username:'',password:'',nombre:'',apellido:'',dni:'',celular:'',email:''});
  const [cap,setCap]=useState(genCaptcha);const [capVal,setCapVal]=useState('');
  const [err,setErr]=useState('');const [loading,setLoading]=useState(false);
  const [unEdited,setUnEdited]=useState(false);

  function slugify(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'');}
  function suggestUn(n,a){
    const nWords=(n||'').trim().split(/\s+/).filter(Boolean);
    const initials=nWords.map(w=>slugify(w).charAt(0)).filter(Boolean).join('');
    const aWords=(a||'').trim().split(/\s+/).filter(Boolean);
    const lastApe=slugify(aWords[aWords.length-1]||'');
    return (initials+lastApe).slice(0,20);
  }

  const set=k=>e=>{
    const v=e.target.value;
    setF(p=>{
      const next={...p,[k]:v};
      if((k==='nombre'||k==='apellido')&&!unEdited){
        next.username=suggestUn(k==='nombre'?v:p.nombre, k==='apellido'?v:p.apellido);
      }
      return next;
    });
  };
  const setUn=e=>{setUnEdited(true);setF(p=>({...p,username:e.target.value}));};
  const setNum=k=>e=>setF(p=>({...p,[k]:e.target.value.replace(/\D/g,'')}));
  const ok1=v=>h('span',{className:'fhint fok-inline'},v||'✓');
  const err1=v=>h('span',{className:'fhint ferr-inline'},v);
  const unOk=f.username.length>=6&&/^[a-zA-Z0-9_]+$/.test(f.username);
  const pwOk=f.password.length>=8;
  const dniOk=/^\d{8}$/.test(f.dni);
  const celOk=/^\d{6,15}$/.test(f.celular);
  const mailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email);

  async function submit(){
    setErr('');
    if(mode==='register'){
      if(!f.nombre.trim()||!f.apellido.trim()) return setErr('Completá nombre y apellido.');
      if(!unOk) return setErr(f.username.length<6?'Usuario: mínimo 6 caracteres.':'Usuario: solo letras, números y guión bajo.');
      if(!pwOk) return setErr('Contraseña: mínimo 8 caracteres.');
      if(!dniOk) return setErr('DNI: exactamente 8 dígitos numéricos.');
      if(!celOk) return setErr('Celular: solo números (6 a 15 dígitos).');
      if(!mailOk) return setErr('Email inválido.');
      if(capVal.trim()!==cap.ans){setCap(genCaptcha());setCapVal('');return setErr('Verificación incorrecta. Intentá de nuevo.');}

function StatsScreen({token}){

    ),
    registros_por_dia.length>0&&h('div',null,

      h('div',{className:'bar-chart'},
        registros_por_dia.map(d=>h('div',{key:d.dia,className:'bar-row'},
          h('div',{className:'bar-day'},d.dia.slice(5)),
          h('div',{className:'bar-bg'},h('div',{className:'bar-fill',style:{width:Math.round(d.n/maxReg*100)+'%'}})),
          h('div',{className:'bar-val'},d.n)
        ))
      )
    ),
    users.recent_pending&&users.recent_pending.length>0&&h('div',null,
      h('div',{className:'sec',style:{marginTop:14}},'⏳ Pendientes de activar'),
      users.recent_pending.map(u=>h('div',{key:u.username,className:'uitem'},
        h('div',{style:{fontWeight:700,fontSize:13}},u.nombre+' '+u.apellido),
        h('div',{style:{fontSize:11,color:'var(--muted)'}}, '@'+u.username+(u.celular?' · 📱 '+u.celular:'')+(u.created_at?' · '+u.created_at.slice(0,10):''))
      ))
    ),
    contacts&&contacts.length>0&&h('div',null,
      h('div',{className:'sec',style:{marginTop:14}},'💬 Últimas consultas'),
      contacts.map((c,i)=>h('div',{key:i,className:'uitem'},
        h('div',{style:{fontSize:12,fontWeight:700}},(c.nombre||'Anónimo')+(c.celular?' · 📱 '+c.celular:'')),
        h('div',{style:{fontSize:11,color:'var(--white2)',marginTop:3,lineHeight:1.4}},c.mensaje),
        h('div',{style:{fontSize:10,color:'var(--muted)',marginTop:3}},c.sent_at)
      ))
    )

}

  const [koMatches,setKoMatches]=useState([]);const [koPicks,setKoPicks]=useState({});const [koResults,setKoResults]=useState({});
  const [lb,setLb]=useState([]);const [lbLoading,setLbLoading]=useState(false);
  const [ready,setReady]=useState(false);
  const [regStatus,setRegStatus]=useState({registro_abierto:true,registro_hasta:''});
  const [showContact,setShowContact]=useState(false);
  const [contactMsg,setContactMsg]=useState('');
  const [contactSending,setContactSending]=useState(false);
  const [contactSent,setContactSent]=useState(false);
  const [contactErr,setContactErr]=useState('');

  async function sendContact(){
    if(!contactMsg.trim()) return setContactErr('Escribí tu consulta antes de enviar.');
    setContactSending(true);setContactErr('');
    const r=await api({action:'send_contact',token,message:contactMsg.trim()});
    setContactSending(false);
    if(r.ok) setContactSent(true);
    else setContactErr(r.error||'Error al enviar. Intentá de nuevo.');
  }
  function closeContact(){setShowContact(false);setContactSent(false);setContactMsg('');setContactErr('');}

  function buildKoResults(kms){const o={};kms.forEach(m=>{if(m.s1!==null)o[m.id]={s1:m.s1,s2:m.s2,scorers1:m.scorers1||[],scorers2:m.scorers2||[],pen1:m.pen1,pen2:m.pen2,winner:m.winner,team1:m.team1,team2:m.team2};});return o;}

  async function loadBase(){
    const [mr,rr,pr,kr,sr]=await Promise.all([
      api({action:'get_matches'}),api({action:'get_results'}),
      api({action:'get_players'}),api({action:'get_knockout_matches'}),
      api({action:'get_status'})
    ]);
    if(mr.ok)setMatches(mr.matches||[]);
    if(rr.ok)setResults(rr.results||{});
    if(pr.ok)setPlayers(pr.players||{});
    if(kr.ok){const kms=kr.knockout_matches||[];setKoMatches(kms);setKoResults(buildKoResults(kms));}
    if(sr.ok)setRegStatus(sr);
  }

  useEffect(()=>{const sess=SS.load();loadBase().then(()=>{setReady(true);if(sess){setUser(sess.user);setToken(sess.token);api({action:'get_picks',token:sess.token}).then(r=>{if(r.ok)setPicks(r.picks||{});});api({action:'get_knockout_picks',token:sess.token}).then(r=>{if(r.ok)setKoPicks(r.picks||{});});}});},[]);

  function login(u,t){setUser(u);setToken(t);api({action:'get_picks',token:t}).then(r=>{if(r.ok)setPicks(r.picks||{});});api({action:'get_knockout_picks',token:t}).then(r=>{if(r.ok)setKoPicks(r.picks||{});});}
  function logout(){SS.clear();setUser(null);setToken(null);setPicks({});setKoPicks({});setTab('picks');}
  function onPickSaved(mid,p){setPicks(prev=>({...prev,[mid]:p}));}
  function onKoPickSaved(mid,p){setKoPicks(prev=>({...prev,[mid]:p}));}
  async function reloadKo(){const r=await api({action:'get_knockout_matches'});if(r.ok){const kms=r.knockout_matches||[];setKoMatches(kms);setKoResults(buildKoResults(kms));}}
  function onResultSaved(mid,res){setResults(p=>({...p,[mid]:res}));reloadKo();}
  function onKoResultSaved(mid,res){setKoResults(p=>({...p,[mid]:res}));reloadKo();}
  async function loadLb(){setLbLoading(true);const r=await api({action:'get_leaderboard'});if(r.ok)setLb(r.board||[]);setLbLoading(false);}
  function switchTab(t){setTab(t);if(t==='standings')loadLb();if(t==='clasif')reloadKo();}

  let myTotal=0,myResOk=0,myExact=0,myScorer=0;
  Object.entries(picks).forEach(([mid,pred])=>{const res=results[mid];if(!res||res.s1===null)return;if(Math.sign(pred.s1-pred.s2)===Math.sign(res.s1-res.s2)){myTotal+=1;myResOk++;}if(pred.s1===res.s1&&pred.s2===res.s2){myTotal+=0.5;myExact++;}[...(res.scorers1||[]),...(res.scorers2||[])].forEach(g=>{if((pred.scorers||[]).includes(g)){myTotal+=0.5;myScorer++;}});});
  Object.entries(koPicks).forEach(([mid,pred])=>{const res=koResults[mid];if(!res||res.s1===null)return;if(res.winner){const pw=pred.s1>pred.s2?res.team1:pred.s2>pred.s1?res.team2:(pred.pen1!=null&&pred.pen2!=null?(pred.pen1>pred.pen2?res.team1:res.team2):null);if(pw&&pw===res.winner){myTotal+=1;myResOk++;}}else{if(Math.sign(pred.s1-pred.s2)===Math.sign(res.s1-res.s2)){myTotal+=1;myResOk++;}}const regEx=pred.s1===res.s1&&pred.s2===res.s2;if(regEx){if(res.s1===res.s2&&res.pen1!=null){if(pred.pen1!=null&&pred.pen2!=null&&pred.pen1===res.pen1&&pred.pen2===res.pen2){myTotal+=0.5;myExact++;}}else{myTotal+=0.5;myExact++;}}[...(res.scorers1||[]),...(res.scorers2||[])].forEach(g=>{if((pred.scorers||[]).includes(g)){myTotal+=0.5;myScorer++;}});});

    {key:'standings',label:'Tabla',       icon:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'},
    ...(user.is_admin?[
      {key:'results',label:'Result.',icon:'M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z'},
      {key:'setup',  label:'Setup',  icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z'},
      {key:'stats',  label:'Stats',  icon:'M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z'},
    ]:[])

  return h('div',{id:'root'},

        h('div',{className:'hdr-right'},
          h(Av,{name:user.username}),
          h('div',null,
            h('div',{style:{fontSize:10,color:'var(--muted)',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},user.nombre||user.username),
            user.is_admin&&h('span',{className:'badge-admin'},'ADMIN'),

          h('button',{className:'btn-out',onClick:logout},'Salir')
        )
      ),
      h('div',{className:'tabbar'},tabs.map(t=>h('button',{key:t.key,className:tab===t.key?'tb active':'tb',onClick:()=>switchTab(t.key)},
        h('svg',{xmlns:'http://www.w3.org/2000/svg',fill:'none',viewBox:'0 0 24 24',stroke:'currentColor',strokeWidth:2},h('path',{strokeLinecap:'round',strokeLinejoin:'round',d:t.icon})),
        t.label
      )))
    ),

    /* ── PRONÓS ─────────────────────────────────────────── */
    tab==='picks'&&h('div',{className:'screen'},
      h('div',{className:'score-card'},
        h('div',null,h('div',{className:'score-big'},fmt(myTotal)),h('div',{className:'score-lbl'},'puntos totales')),
        h('div',{className:'score-detail'},
          h('span',null,h('strong',null,myResOk),' resultados correctos'),
          h('span',null,h('strong',null,myExact),' scores exactos'),
          h('span',null,h('strong',null,myScorer),' goleadores acertados')

      h('div',{className:'pts-leg'},

        })
      )
    ),

    /* ── SETUP (admin) ──────────────────────────────────── */
    tab==='setup'&&user.is_admin&&h(SetupScreen,{token,matches,koMatches,
      onMatchesUpdated:async()=>{const r=await api({action:'get_matches'});if(r.ok)setMatches(r.matches||[]);},
      onKoUpdated:reloadKo,
      onPlayersUpdated:async()=>{const r=await api({action:'get_players'});if(r.ok)setPlayers(r.players||{});}}),

    /* ── STATS (admin) ───────────────────────────────────── */
    tab==='stats'&&user.is_admin&&h(StatsScreen,{token}),

    /* ── FAB CONSULTA ──────────────────────────────────── */
    h('button',{className:'fab-contact',onClick:()=>setShowContact(true),'aria-label':'Consultas'},
      h('svg',{xmlns:'http://www.w3.org/2000/svg',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,style:{width:26,height:26}},
        h('path',{strokeLinecap:'round',strokeLinejoin:'round',d:'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z'})
      )
    ),

    /* ── MODAL CONTACTO GLOBAL ─────────────────────────── */
    showContact&&h('div',{className:'contact-overlay',onClick:e=>e.target===e.currentTarget&&closeContact()},
      h('div',{className:'contact-box'},
        h('div',{className:'contact-head'},
          h('strong',null,'💬 Consultas'),
          h('button',{className:'contact-close',onClick:closeContact},'✕')
        ),
        contactSent
          ?h('div',{className:'contact-sent'},
              h('div',{style:{fontSize:'2rem',marginBottom:10}},'✅'),
              h('div',{style:{fontWeight:700,color:'var(--gtx)',marginBottom:6,fontSize:13}},'Mensaje enviado'),
              h('div',{style:{fontSize:11,color:'var(--muted)',marginBottom:16}},'Te contactaremos a tu mail o WhatsApp.'),
              h('button',{className:'btn-gold',style:{width:'100%',height:36,fontSize:12},onClick:closeContact},'Cerrar')
            )
          :h('div',null,
              h('div',{style:{fontSize:11,color:'var(--muted)',marginBottom:9}},'Escribí tu consulta y te respondemos por mail o WhatsApp.'),
              h('textarea',{className:'contact-ta',value:contactMsg,onChange:e=>setContactMsg(e.target.value),placeholder:'Tu consulta…',maxLength:500}),
              h('div',{style:{fontSize:10,color:'var(--muted)',textAlign:'right',marginTop:2}},contactMsg.length+'/500'),
              contactErr&&h('div',{style:{fontSize:11,color:'var(--rtx)',marginTop:5}},contactErr),
              h('button',{className:'btn-gold',style:{width:'100%',marginTop:10,height:36,fontSize:12},disabled:contactSending,onClick:sendContact},
                contactSending?'Enviando…':'Enviar consulta')
            )
      )
    ),
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
